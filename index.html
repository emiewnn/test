<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMIWAN | Presets</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #333333;
            --hover: #fcfcfc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 1.2rem; }
        
        .container { max-width: 600px; width: 100%; }

        .preset-card {
            border-bottom: 1px solid var(--accent);
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            opacity: 0; /* For fade-in animation */
            transform: translateY(10px);
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .preset-info h2 { font-size: 1rem; font-weight: 500; margin: 0; color: #ccc; }
        .preset-info p { font-size: 0.8rem; color: #666; margin: 5px 0 0 0; }

        .download-btn {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        footer { margin-top: 100px; color: #444; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <h1>EMIWAN</h1>
    </header>

    <div class="container">
        <!-- Preset Item 1 -->
        <div class="preset-card">
            <div class="preset-info">
                <h2>Smooth Zoom V2</h2>
                <p>After Effects CC+</p>
            </div>
            <a href="YOUR_GOOGLE_DRIVE_LINK" class="download-btn">Download</a>
        </div>

        <!-- Preset Item 2 -->
        <div class="preset-card" style="animation-delay: 0.2s;">
            <div class="preset-info">
                <h2>Cinematic Glow</h2>
                <p>Needs Deep Glow or S_Glow</p>
            </div>
            <a href="YOUR_GOOGLE_DRIVE_LINK" class="download-btn">Download</a>
        </div>
    </div>

    <footer>FREE PRESETS & ASSETS</footer>

</body>
</html>
