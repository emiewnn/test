<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMIWAN | Shake Tutorial</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #222222;
            --gray: #666666;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 80px; }
        h1 { font-weight: 200; letter-spacing: 10px; text-transform: uppercase; font-size: 1.4rem; margin: 0; }

        .download-box {
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 1.1rem; font-weight: 400; letter-spacing: 1px; margin-bottom: 10px; color: #ccc; }
        .support-note { font-size: 0.7rem; color: var(--gray); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        /* Version Selector */
        .version-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .v-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--gray);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            font-family: inherit;
        }

        .v-btn:hover { border-color: #555; color: #fff; }
        .v-btn.active {
            border-color: var(--text);
            color: var(--bg);
            background: var(--text);
        }

        /* Main Download Button */
        .main-download {
            display: inline-block;
            text-decoration: none;
            background: none;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 15px 40px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .main-download:hover {
            background: var(--text);
            color: var(--bg);
            transform: scale(1.05);
        }

        footer { margin-top: 100px; color: #333; font-size: 0.6rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <h1>EMIWAN</h1>
    </header>

    <div class="download-box">
        <h2>SHAKE TUTORIAL PROJECT FILE</h2>
        <p class="support-note">Versions below 2023 not supported</p>

        <div class="version-selector">
            <button class="v-btn" onclick="setVersion('23')" id="btn23">2023</button>
            <button class="v-btn" onclick="setVersion('24')" id="btn24">2024</button>
            <button class="v-btn active" onclick="setVersion('25')" id="btn25">2025</button>
            <button class="v-btn" onclick="setVersion('26')" id="btn26">2026</button>
        </div>

        <a href="#" id="downloadLink" class="main-download" download>Download Project</a>
    </div>

    <footer>EST. 2024 — ALL ASSETS FREE</footer>

    <script>
        // Mapping versions to your exact file paths
        const files = {
            '23': 'files/Shake Tutorial Project-File/EMIEWN shake preset 23x.aep',
            '24': 'files/Shake Tutorial Project-File/EMIEWN shake preset 24.x.aep',
            '25': 'files/Shake Tutorial Project-File/EMIEWN shake preset 25x.aep',
            '26': 'files/Shake Tutorial Project-File/EMIEWN shake preset 26x.aep'
        };

        function setVersion(ver) {
            // 1. Update the Download Link URL
            const link = document.getElementById('downloadLink');
            link.href = files[ver];

            // 2. Update Button UI
            document.querySelectorAll('.v-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + ver).classList.add('active');
        }

        // Initialize with 2025 version
        setVersion('25');
    </script>

</body>
</html>
